<html>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <meta name="google-signin-client_id" content="382033508368-tgeas4a4nne4o68tkmhachf4uue79od8.apps.googleusercontent.com">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="gooservee">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>gooservee</title>
  <link rel="manifest" href="manifest.json">

  <!-- 📍 Google Maps for Web -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAbuq1D2c5ZgL5jGjQSCp3tFWx2S7aBl60"></script>
  <style>
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #FF6B00;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>

  <!-- 🔔 OneSignal Web SDK -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "84f79509-0ca9-43e1-b5eb-9f363a5c3b85",
        allowLocalhostAsSecureOrigin: true,
      OneSignal.Slidedown.promptPush();
    });

    window.getOneSignalSubscriptionId = function() {
      if (window.OneSignal && window.OneSignal.User && window.OneSignal.User.PushSubscription) {
        return window.OneSignal.User.PushSubscription.id;
      }
      return null;
    };
  </script>
</head>
<body style="background-color: white;">
  <div class="loading">
    <div class="spinner"></div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
